<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128" width="100%" height="100%">
  <defs>
    <!-- Accent Gradient matching the site's styling -->
    <linearGradient id="neonGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#00d2ff" />
      <stop offset="50%" stop-color="#3a7bd5" />
      <stop offset="100%" stop-color="#7c3aed" />
    </linearGradient>
    
    <!-- Outer Glow Filter -->
    <filter id="neonGlow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="5" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
  </defs>

  <!-- Dark Slate Rounded Background -->
  <rect x="4" y="4" width="120" height="120" rx="28" fill="#0b111e" stroke="url(#neonGrad)" stroke-width="4" />
  
  <!-- Subtle glowing circle -->
  <circle cx="64" cy="64" r="48" fill="none" stroke="url(#neonGrad)" stroke-width="1.5" opacity="0.35" filter="url(#neonGlow)" />
  
  <!-- Developer Monogram Symbol (A + B + Code Brackets) -->
  <g stroke="url(#neonGrad)" stroke-width="8" stroke-linecap="round" stroke-linejoin="round" fill="none">
    <!-- Left bracket '<' -->
    <path d="M 46 44 L 28 64 L 46 84" />
    <!-- Right bracket '>' -->
    <path d="M 82 44 L 100 64 L 82 84" />
    <!-- Center white slash '/' that forms a stylized divider -->
    <path d="M 72 36 L 56 92" stroke="#ffffff" stroke-width="9" />
  </g>
</svg>
